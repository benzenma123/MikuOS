LABEL arch
TEXT HELP
Boot the MikuOS Live on BIOS.
It allows you to install MikuOS or perform system maintenance.
ENDTEXT
MENU LABEL MikuOS Live (%ARCH%, BIOS)
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% quiet splash

# Accessibility boot option
LABEL archspeech
TEXT HELP
Boot the MikuOS Live on BIOS with speakup screen reader.
It allows you to install MikuOS or perform system maintenance with speech feedback.
ENDTEXT
MENU LABEL MikuOS Live (%ARCH%, BIOS) with ^speech
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% accessibility=on
